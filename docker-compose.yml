version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: ai-b2b-sales-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_NAME: ${APP_NAME:-AI B2B Sales Knowledge Base & Lead Qualification System}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: ai-b2b-sales-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: ai-b2b-sales-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai-b2b-sales-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
