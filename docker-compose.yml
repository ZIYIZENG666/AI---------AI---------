version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: ai-b2b-sales-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/ai_b2b_sales}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: ai-b2b-sales-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: ai-b2b-sales-postgres
    environment:
      POSTGRES_DB: ai_b2b_sales
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai-b2b-sales-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
